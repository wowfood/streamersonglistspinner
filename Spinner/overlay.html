<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Song Queue Spinner — Overlay</title>
    <link rel="stylesheet" href="SongSpinner.css">
</head>
<body class="overlay-mode">

<div id="container">
    <div id="wheelSection">
        <div id="wheelContents">
        <div id="pointer"></div>
        <div id="wheelContainer"></div>

        <!-- Hidden — required by shared JS but not shown on overlay -->
        <div id="buttonContainer" style="display:none;">
            <button id="spinButton">SPIN</button>
        </div>

        <div id="status" style="display:none;"></div>
        </div>
    </div>

    <div id="resizeHandle" style="display:none;"></div>

    <div id="playedList">
        <div id="playedListTop">
            <button id="collapseBtn" class="collapse-button" onclick="togglePlayedListCollapse()" title="Collapse/Expand Played List" style="display:none;">
                <span id="collapseIcon">◀</span>
            </button>
            <div id="streamerSection">
                <input type="text" id="streamerInput" style="display:none;">
                <span id="streamerLabel"></span>
                <button id="changeStreamerBtn" class="small-button" style="display:none;"></button>
            </div>
        </div>
        <div id="playedListContent">
        <div id="soungCounterSection">
            <h3>Played Songs:  <span id="playedCount">0</span></h3>
            <h3>Queued Songs:  <span id="availableCount">0</span></h3>
        </div>
        <ul id="playedSongsUl"></ul>
            <div class="toggle-container" style="display:none;">
                <button id="resetBtn" class="small-button" style="display:none;"></button>
                <div class="toggle-right">
                    <span class="toggle-label">Toggle Wheel</span>
                    <label class="switch">
                        <input type="checkbox" id="showWheelCheckbox" onchange="toggleWheel(this)" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
    </div>
    </div>
</div>

<div id="winnerModal" class="winner-modal" style="display:none;">
    <div class="winner-modal-backdrop" onclick="closeWinnerModal()"></div>
    <div class="winner-modal-content" role="dialog" aria-modal="true" aria-labelledby="winnerTitle">
        <div id="winnerConfetti" class="winner-confetti"></div>
        <h2 id="winnerTitle">Winner</h2>
        <p id="winnerMainLine" class="winner-main-line"></p>
        <p id="winnerDetails" class="winner-details"></p>
        <button class="small-button" onclick="closeWinnerModal()">Close</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/spin-wheel@5.0.2/dist/spin-wheel-iife.js"></script>
<script src="config.js"></script>
<script src="scripts/SongSpinner.state.js"></script>
<script src="scripts/SongSpinner.config.js"></script>
<script src="scripts/SongSpinner.data.js"></script>
<script src="scripts/SongSpinner.ui.js"></script>
<script src="scripts/SongSpinner.actions.js"></script>
<script src="scripts/SongSpinner.sync.js"></script>
<script src="scripts/SongSpinner.overlay-bootstrap.js"></script>

</body>
</html>
